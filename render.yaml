services:
  - type: web
    name: html-obf-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # Set manually in Render dashboard
      - key: WEBHOOK_URL
        sync: false          # Set manually — e.g. https://html-obf-bot.onrender.com
      - key: PORT
        value: 10000
